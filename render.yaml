services:
  - type: web
    name: investor-portal
    runtime: python
    buildCommand: apt-get install -y tesseract-ocr tesseract-ocr-spa poppler-utils && pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
